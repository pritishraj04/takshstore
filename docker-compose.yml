services:
  db:
    image: postgres:15-alpine
    container_name: taksh-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres           
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - taksh_db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: taksh-api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - apps/api/.env
    # environment:
    #   # This overrides the .env file strictly inside the container!
    #   - DATABASE_URL=postgresql://postgres:password@db:5432/postgres?schema=public&sslmode=disable
    depends_on:
      - db

volumes:
  taksh_db_data: