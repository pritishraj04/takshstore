version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm install -g pnpm
      - pnpm install --frozen-lockfile
      - cd apps/api && npx prisma generate
      - pnpm --filter api build
run:
  command: node apps/api/dist/src/main.js
  network:
    port: 8080
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "8080"
