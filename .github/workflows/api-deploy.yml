name: API CI/CD Pipeline

# Only trigger when code is pushed to the main branch AND changes happen in the API folder
on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/api/**'

env:
  AWS_REGION: us-east-1 # Change this to your actual AWS region
  ECR_REPOSITORY: taksh-api

jobs:
  test:
    name: Quality Assurance (Lint & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './apps/api/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type Check & Lint
        run: npm run lint

      # Uncomment when you have written Jest automation tests
      # - name: Run Unit Tests
      #   run: npm run test

  build-and-push:
    name: Build Docker Image & Push to AWS
    needs: test # This ensures Docker only builds if the code passes QA
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} # Tags the image with the specific git commit hash
          LATEST_TAG: latest
        run: |
          # Build the image using your multi-stage Dockerfile
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG .
          
          # Push the specific commit version
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Update the "latest" tag for your server to pull
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG
